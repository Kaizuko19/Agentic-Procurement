<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sourcing Request - NSD Agent</title>
    <style>
        :root {
            --midnight-blue: #193E6B;
            --midnight-blue-dark: #143356;
            --green-gold: #B3A125;
            --green-gold-dark: #96851f;
            --white: #FFFFFF;
            --neutral-gray: #F5F5F5;
            --border-gray: #E6ECF3;
            --text-main: #1f2937;
            --text-muted: #5b6678;
            --surface-soft: #f8fbff;
            --focus-ring: 0 0 0 3px rgba(179, 161, 37, 0.35);
            --shadow-soft: 0 8px 24px rgba(17, 24, 39, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 12% 8%, rgba(179, 161, 37, 0.14), rgba(179, 161, 37, 0) 40%),
                radial-gradient(circle at 92% 88%, rgba(25, 62, 107, 0.18), rgba(25, 62, 107, 0) 44%),
                linear-gradient(170deg, #f3f7fd 0%, #ffffff 52%, #edf3fb 100%);
        }

        .top-bar {
            background: var(--midnight-blue);
            border-bottom: 4px solid var(--green-gold);
            color: var(--white);
            padding: 12px 20px;
        }

        .top-inner {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo {
            min-height: 42px;
            padding: 7px 12px;
            border: 2px solid rgba(255, 255, 255, 0.72);
            border-radius: 10px;
            font-weight: 700;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .brand-logo .accent {
            color: var(--green-gold);
            font-weight: 800;
        }

        .brand h1 {
            margin: 0;
            font-size: clamp(22px, 1.8vw, 30px);
            line-height: 1.2;
            font-weight: 700;
        }

        .main-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .main-nav a {
            text-decoration: none;
            color: var(--white);
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 8px 12px;
            font-family: "Segoe UI", sans-serif;
            font-weight: 600;
            font-size: 15px;
        }

        .main-nav a[aria-current="page"] {
            border-color: rgba(255, 255, 255, 0.32);
            background: rgba(255, 255, 255, 0.16);
        }

        .main-nav a:hover,
        .main-nav a:focus-visible {
            outline: none;
            border-color: rgba(255, 255, 255, 0.32);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: var(--focus-ring);
        }

        main {
            max-width: 1300px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--white);
            border: 1px solid var(--border-gray);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(17, 24, 39, 0.08);
        }

        .card h2 {
            margin-top: 0;
            font-size: 20px;
            font-weight: 700;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }

        input, select, textarea {
            border: 1px solid var(--border-gray);
            border-radius: 8px;
            padding: 10px 12px;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--midnight-blue);
            box-shadow: 0 0 0 3px rgba(25, 62, 107, 0.1);
        }

        textarea { min-height: 100px; resize: vertical; }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn {
            border: none;
            cursor: pointer;
            border-radius: 8px;
            padding: 10px 18px;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: var(--midnight-blue);
            color: var(--white);
        }

        .btn-secondary {
            background: var(--green-gold);
            color: var(--white);
        }

        footer {
            text-align: center;
            padding: 20px;
            background: var(--midnight-blue);
            color: var(--white);
            margin-top: 40px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
            .main-nav { gap: 4px; }
        }
    </style>
</head>
<body>
    <header class="top-bar">
        <div class="top-inner">
            <div class="brand">
                <div class="brand-logo">CLaaS<span class="accent">2</span>SaaS</div>
                <h1>New Supplier Discovery Agent</h1>
            </div>
            <nav class="main-nav">
                <a href="NSD-Sourcing-Request.html" aria-current="page">Sourcing Request</a>
                <a href="NSD-Supplier-Discovery.html">Supplier Discovery</a>
                <a href="NSD-Supplier-Ranking.html">Supplier Ranking</a>
                <a href="NSD-Vendor-Onboarding.html">Vendor Onboarding</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="card">
            <h2>Create Sourcing Request</h2>
            <p style="color: var(--text-muted); margin-top: 6px;">Capture requirements for supplier discovery and evaluation.</p>

            <div class="grid-2">
                <div class="form-group">
                    <label>Request No</label>
                    <input type="text" value="REQ-2026-008" readonly>
                </div>
                <div class="form-group">
                    <label>Requested By</label>
                    <input type="text" placeholder="Your name">
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Item Code (BC Item Master)</label>
                    <input type="text" placeholder="e.g. MAT-2024-001">
                </div>
                <div class="form-group">
                    <label>Item Category</label>
                    <select>
                        <option>Electronics</option>
                        <option>Packaging</option>
                        <option>Raw Materials</option>
                        <option>Services</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" placeholder="e.g. Austin, TX">
                </div>
            </div>

            <div class="form-group">
                <label>Quality Requirement</label>
                <textarea placeholder="Describe quality standards and specifications"></textarea>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Certification Requirement</label>
                    <input type="text" placeholder="ISO 9001, FDA, etc.">
                </div>
                <div class="form-group">
                    <label>Sustainability Requirement</label>
                    <input type="text" placeholder="e.g. recycled content">
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Target Unit Cost</label>
                    <input type="text" placeholder="$ / unit">
                </div>
                <div class="form-group">
                    <label>Maximum Lead Time</label>
                    <input type="text" placeholder="e.g. 45 days">
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-secondary">Save Draft</button>
                <button class="btn btn-primary">Submit Request</button>
            </div>
        </div>
        <div class="card">
    <h2>Evaluation Weights</h2>
    <div class="grid-2">
        <div class="form-group">
            <label>Quality Weight (%)</label>
            <input type="number" placeholder="e.g. 40">
        </div>
        <div class="form-group">
            <label>Cost Weight (%)</label>
            <input type="number" placeholder="e.g. 30">
        </div>
        <div class="form-group">
            <label>Reliability Weight (%)</label>
            <input type="number" placeholder="e.g. 20">
        </div>
        <div class="form-group">
            <label>Other Criteria (%)</label>
            <input type="number" placeholder="e.g. 10">
        </div>
    </div>
</div>
    </main>

    <footer>
        Copyright © 2026 New Supplier Discovery Agent
    </footer>
</body>
</html>
